openapi: 3.0.3
info:
  title: Student Management System — API Gateway
  description: |
    Unified API Gateway for the University Student Management System.
    All requests are proxied to the appropriate microservice via the `/api` prefix.

    ### Microservice Routing
    | Prefix            | Target Service          |
    |-------------------|-------------------------|
    | `/api/students`   | User & Auth Service     |
    | `/api/auth`       | User & Auth Service     |
    | `/api/courses`    | Course Service          |
    | `/api/enrollments`| Enrollment Service      |
    | `/api/enroll`     | Enrollment Service      |
    | `/api/grades`     | Grade Service           |
    | `/api/gpa`        | Grade Service           |
  version: 1.0.0
  contact:
    name: Y4 Systems — SE4010
  license:
    name: MIT

servers:
  - url: https://api-gateway-763150334229.us-central1.run.app
    description: Production (Google Cloud Run)
  - url: http://localhost:8080
    description: Local Development

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from POST /api/auth/login

  schemas:
    # ── Student ─────────────────────────────
    Student:
      type: object
      properties:
        _id:
          type: string
          example: "60f7b2c9e1d3a4001f3e7a01"
        name:
          type: string
          example: "Test Name"
        email:
          type: string
          example: "test@university.edu"
        programme:
          type: string
          example: "BSc Computer Science"
        status:
          type: string
          enum: [Active, Inactive, Graduated]
          example: "Active"

    # ── Auth ────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "test@university.edu"
        password:
          type: string
          example: "password123"

    RegisterRequest:
      type: object
      required: [name, email, password, phone]
      properties:
        name:
          type: string
          example: "Test Name"
        email:
          type: string
          format: email
          example: "test@university.edu"
        password:
          type: string
          minLength: 6
          example: "password123"
        phone:
          type: string
          example: "0712345678"
        role:
          type: string
          enum: [admin, student]
          example: "student"

    RegisterResponse:
      type: object
      properties:
        id:
          type: string
          example: "507f1f77bcf86cd799439011"
        email:
          type: string
          format: email
          example: "test@university.edu"
        name:
          type: string
          example: "Test Name"
        phone:
          type: string
          example: "0712345678"

    ValidateResponse:
      type: object
      properties:
        id:
          type: string
          example: "507f1f77bcf86cd799439011"
        email:
          type: string
          format: email
          example: "test@university.edu"
        name:
          type: string
          example: "Test Name"
        role:
          type: string
          enum: [admin, student]
          example: "student"

    LoginResponse:
      type: object
      properties:
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIs..."
        expiresIn:
          type: string
          example: "24h"
        user:
          $ref: '#/components/schemas/Student'

    # ── Course ──────────────────────────────
    Course:
      type: object
      properties:
        _id:
          type: string
          example: "60f7b2c9e1d3a4001f3e7b02"
        name:
          type: string
          example: "Cloud Computing"
        courseId:
          type: string
          example: "SE4010"
        description:
          type: string
          example: "Introduction to cloud-native architectures"
        credits:
          type: integer
          example: 3

    # ── Enrollment ──────────────────────────
    Enrollment:
      type: object
      properties:
        _id:
          type: string
          example: "60f7b2c9e1d3a4001f3e7c03"
        student_id:
          type: string
          example: "S1001"
        course_id:
          type: string
          example: "C2002"
        status:
          type: string
          enum: [ACTIVE, CANCELLED, WITHDRAWN, COMPLETED]
          example: "ACTIVE"
        enrolled_at:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EnrollRequest:
      type: object
      required: [student_id, course_id]
      properties:
        student_id:
          type: string
          example: "S1001"
        course_id:
          type: string
          example: "C2002"

    # ── Grade ───────────────────────────────
    Grade:
      type: object
      properties:
        _id:
          type: string
        student_id:
          type: string
          example: "S1001"
        course_id:
          type: string
          example: "C2002"
        marks:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
          example: 88.5
        grade:
          type: string
          enum: [A, B, C, D, F]
          nullable: true
          example: "A"
        semester:
          type: string
          example: "S1"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    GPA:
      type: object
      properties:
        student_id:
          type: string
        gpa:
          type: number
          example: 3.72

    # ── Common ──────────────────────────────
    Error:
      type: object
      properties:
        message:
          type: string

    StatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ACTIVE, CANCELLED, WITHDRAWN, COMPLETED]
          example: "COMPLETED"

tags:
  - name: Gateway
    description: API Gateway health & info
  - name: Auth
    description: Authentication (proxied to User Service)
  - name: Students
    description: Student management (proxied to User Service)
  - name: Courses
    description: Course catalog (proxied to Course Service)
  - name: Enrollments
    description: Enrollment management (proxied to Enrollment Service)
  - name: Grades
    description: Grade records & GPA (proxied to Grade Service)

# ═══════════════════════════════════════════════
#  PATHS
# ═══════════════════════════════════════════════
paths:
  # ── Gateway ─────────────────────────────────
  /health:
    get:
      tags: [Gateway]
      summary: Gateway health check
      responses:
        '200':
          description: Gateway is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "API Gateway is Running"

  # ── Auth ────────────────────────────────────
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and get JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              studentRegister:
                summary: Register as student
                value:
                  name: "Test Name"
                  email: "test@university.edu"
                  password: "password123"
                  phone: "0712345678"
                  role: "student"
      responses:
        '201':
          description: Student registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/auth/validate:
    get:
      tags: [Auth]
      summary: Validate JWT token
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateResponse'
        '401':
          description: Invalid or expired token

  # ── Students ────────────────────────────────
  /api/students/{id}:
    get:
      tags: [Students]
      summary: Get student by ID
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Student ID (MongoDB ObjectId or custom ID)
      responses:
        '200':
          description: Student details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Student'
        '404':
          description: Student not found

    put:
      tags: [Students]
      summary: Update student details
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Student'
      responses:
        '200':
          description: Student updated
        '404':
          description: Student not found

    delete:
      tags: [Students]
      summary: Delete a student
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Student deleted
        '404':
          description: Student not found

  # ── Courses ─────────────────────────────────
  /api/courses:
    get:
      tags: [Courses]
      summary: Get all courses
      responses:
        '200':
          description: List of courses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Course'

    post:
      tags: [Courses]
      summary: Create a new course
      description: Requires JWT with role `admin`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, courseId]
              properties:
                name:
                  type: string
                  example: "Cloud Computing"
                courseId:
                  type: string
                  example: "SE4010"
                description:
                  type: string
                  example: "Introduction to cloud-native architectures"
                credits:
                  type: integer
                  example: 3
      responses:
        '201':
          description: Course created
        '400':
          description: Validation error

  /api/courses/{id}:
    get:
      tags: [Courses]
      summary: Get course by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Course details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Course'
        '404':
          description: Course not found

    put:
      tags: [Courses]
      summary: Update a course
      description: Requires JWT with role `admin`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Course'
      responses:
        '200':
          description: Course updated
        '404':
          description: Course not found

    delete:
      tags: [Courses]
      summary: Delete a course
      description: Requires JWT with role `admin`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Course deleted
        '404':
          description: Course not found

  # ── Enrollments ─────────────────────────────
  /api/enroll:
    post:
      tags: [Enrollments]
      summary: Enroll a student in a course
      description: |
        Validates student and course via external services, creates enrollment, and triggers Grade Service to create a grade record.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollRequest'
      responses:
        '201':
          description: Enrollment created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Enrollment created successfully"
                  enrollment:
                    $ref: '#/components/schemas/Enrollment'
        '400':
          description: Missing student_id or course_id
        '401':
          description: Unauthorized
        '409':
          description: Student already enrolled in this course
        '503':
          description: External microservice unreachable

  /api/enroll/{id}:
    delete:
      tags: [Enrollments]
      summary: Cancel an enrollment
      description: Sets enrollment status to CANCELLED
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Enrollment record ID
      responses:
        '200':
          description: Enrollment cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  enrollment:
                    $ref: '#/components/schemas/Enrollment'
        '400':
          description: Already cancelled
        '404':
          description: Enrollment not found

  /api/enrollments:
    get:
      tags: [Enrollments]
      summary: Get all enrollments
      description: Returns a list of all enrollment records in the system (proxied to Enrollment Service).
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of all enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Enrollment'
        '404':
          description: No enrollments found
        '500':
          description: Internal server error

  /api/enrollments/student/{studentId}:
    get:
      tags: [Enrollments]
      summary: Get enrollments by student
      description: Returns all enrollments for a specific student (read-only)
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
          description: The student ID
      responses:
        '200':
          description: List of enrollments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Enrollment'
        '404':
          description: No enrollments found

  /api/enrollments/course/{courseId}:
    get:
      tags: [Enrollments]
      summary: Get course roster
      description: Returns all students enrolled in a specific course
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
          description: The course ID
      responses:
        '200':
          description: List of enrollments (roster)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Enrollment'
        '404':
          description: No enrollments found

  /api/enrollments/check:
    get:
      tags: [Enrollments]
      summary: Check enrollment status
      description: Internal validation endpoint — checks if a student is enrolled in a course
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: studentId
          required: true
          schema:
            type: string
        - in: query
          name: courseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Enrollment check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  isEnrolled:
                    type: boolean
                  status:
                    type: string
                    nullable: true
                  enrollment_id:
                    type: string

  /api/enrollments/{id}/status:
    patch:
      tags: [Enrollments]
      summary: Update enrollment status
      description: Update status to ACTIVE, CANCELLED, WITHDRAWN, or COMPLETED
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusUpdateRequest'
      responses:
        '200':
          description: Status updated
        '400':
          description: Invalid status value
        '404':
          description: Enrollment not found

  # ── Grades ──────────────────────────────────
  /api/grades:
    get:
      tags: [Grades]
      summary: Get all grades
      description: Returns all grade records, limit 100 most recent. Requires JWT with role `admin` or `student`.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of grade records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Grade'
        '404':
          description: No grades found

    post:
      tags: [Grades]
      summary: Create a grade record
      description: Usually triggered automatically by Enrollment Service after enrollment. Requires JWT with role `admin`.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, course_id]
              properties:
                student_id:
                  type: string
                  example: "S1001"
                course_id:
                  type: string
                  example: "C2002"
                semester:
                  type: string
                  default: "S1"
                  example: "S1"
      responses:
        '201':
          description: Grade record created
        '400':
          description: Invalid parameters or student not actively enrolled
        '409':
          description: Grade record already exists

  /api/grades/course/{courseId}:
    get:
      tags: [Grades]
      summary: Get grades by course
      description: Returns all grade records for a course, enriched with student names. Requires JWT with role `admin` or `student`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of grade records for the course
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Grade'
                    - type: object
                      properties:
                        student_name:
                          type: string
                          nullable: true
        '404':
          description: No grades found for this course

  /api/grades/course/{courseId}/stats:
    get:
      tags: [Grades]
      summary: Get course grade statistics
      description: Returns aggregated stats (average, min, max, pass rate, grade distribution). Requires JWT with role `admin` or `student`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: courseId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Course grade statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  course_id:
                    type: string
                  graded_count:
                    type: integer
                  average_marks:
                    type: number
                    nullable: true
                  min_marks:
                    type: number
                    nullable: true
                  max_marks:
                    type: number
                    nullable: true
                  pass_rate:
                    type: number
                    nullable: true
                  grade_distribution:
                    type: object
                    properties:
                      A: { type: integer }
                      B: { type: integer }
                      C: { type: integer }
                      D: { type: integer }
                      F: { type: integer }

  /api/grades/student/{studentId}:
    get:
      tags: [Grades]
      summary: Get grades for a student
      description: Returns all grade records for a student, enriched with course names. Requires JWT with role `admin` or `student`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of grade records
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: '#/components/schemas/Grade'
                    - type: object
                      properties:
                        course_name:
                          type: string
                          nullable: true
        '404':
          description: No grades found

  /api/grades/{id}:
    get:
      tags: [Grades]
      summary: Get a single grade by ID
      description: Requires JWT with role `admin` or `student`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grade record
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Grade'
        '404':
          description: Grade not found

    put:
      tags: [Grades]
      summary: Update marks for a grade
      description: Assigns or updates marks (0–100). Grade letter is auto-calculated. Requires JWT with role `admin`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [marks]
              properties:
                marks:
                  type: number
                  minimum: 0
                  maximum: 100
                  example: 88
      responses:
        '200':
          description: Grade updated
        '400':
          description: Invalid marks
        '404':
          description: Grade not found

    delete:
      tags: [Grades]
      summary: Delete a grade record
      description: Requires JWT with role `admin`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Grade deleted
        '404':
          description: Grade not found

  /api/gpa/{studentId}:
    get:
      tags: [Grades]
      summary: Get student GPA
      description: Calculates GPA for graded courses. Optionally filter by semester with `?semester=S1`. Requires JWT with role `admin` or `student`.
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
        - in: query
          name: semester
          required: false
          schema:
            type: string
          description: Optional semester code (e.g. S1) to calculate GPA for a specific semester
      responses:
        '200':
          description: Student GPA
          content:
            application/json:
              schema:
                type: object
                properties:
                  student_id:
                    type: string
                  semester:
                    type: string
                    nullable: true
                    description: Present when filtered by semester
                  gpa:
                    type: number
                    nullable: true
                    example: 3.72
                  total_credits:
                    type: number
                  graded_courses:
                    type: integer
        '404':
          description: No grades found for this student
